# Momentum rotation over the POINT-IN-TIME top-10 S&P names by market cap.
# Membership comes from data/universe_top10.json (yearly approximate schedule;
# regenerate precisely with data/generate_universe_qc.py in a QC research notebook).
# `universe` must contain the UNION of every symbol that ever appears in the
# membership file — all get subscribed; only the active set is scored each rebalance.
strategy: qpipe.strategies.etf_rotation:EtfRotation
config_class: qpipe.strategies.etf_rotation:EtfRotationConfig
symbol: AAPL            # primary: rebalance clock; in the universe the whole decade
venue: XNAS
bar_spec: 1-DAY-LAST
account_type: CASH
fees: none
universe: [MSFT, GOOGL, AMZN, META, XOM, JNJ, GE, WFC, JPM, BAC, V, UNH, PG, WMT, TSLA, NVDA, LLY, AVGO]
fixed:
  rebalance_frequency: weekly
  week_momentum: 5
  short_momentum: 21
  medium_momentum: 63
  long_momentum: 126
  trend_momentum: 252
  volume_lookback: 21
  membership_file: data/universe_top10.json
space:
  num_positions: {type: int, low: 1, high: 5}
  # Lookbacks are optimizable too — move any `fixed` param here, e.g.:
  # short_momentum: {type: int, low: 10, high: 42, step: 1}
  # long_momentum: {type: int, low: 63, high: 189, step: 21}
  week_weight: {type: float, low: 0.0, high: 0.4, step: 0.05}
  short_weight: {type: float, low: 0.0, high: 0.4, step: 0.05}
  medium_weight: {type: float, low: 0.0, high: 0.4, step: 0.05}
  long_weight: {type: float, low: 0.0, high: 0.4, step: 0.05}
  volume_min: {type: float, low: 0.5, high: 1.0, step: 0.1}
  volume_max: {type: float, low: 1.0, high: 1.5, step: 0.1}
constraints:
  - "week_weight + short_weight + medium_weight + long_weight <= 1.0"
objective: sharpe
